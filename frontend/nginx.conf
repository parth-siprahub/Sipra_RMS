server {
    server_name rms.siprahub.com;

    root /home/neuroassist/Sipra_RMS/frontend/dist;
    index index.html;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8002$request_uri;
        proxy_http_version 1.1;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/rms.siprahub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rms.siprahub.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name rms.siprahub.com;

    return 301 https://$host$request_uri;
}