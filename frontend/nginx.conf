server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── FastAPI (uvicorn) ───────────────────────────────────────────────────
    # Use 127.0.0.1 so the backend is not exposed on all interfaces.
    upstream rms_backend {
        server 127.0.0.1:8000;
    }

    # ── API routing (prefix-based; avoids regex + SPA fallback 405 on PATCH) ─
    #
    # If a write (PATCH/POST/PUT/DELETE) misses every block below, nginx falls
    # through to `location /` + try_files and returns 405 Method Not Allowed
    # (static files only allow GET/HEAD).
    #
    # Recommended production: VITE_API_URL=https://your-host/api  (trailing
    # path is /api — no trailing slash required on the env value)
    location /api/ {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend/;
    }

    # Same-origin builds with VITE_API_URL=https://your-host (no /api segment)
    location ^~ /billing-config {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /job-profiles {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /candidates {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /timesheets {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /requests {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /employees {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /dashboard {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /billing {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /reports {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /exports {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /vendors {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /clients {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /audit {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /sows {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /auth {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /logs {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /health {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /ready {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /docs {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location ^~ /redoc {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }
    location = /openapi.json {
        include /etc/nginx/proxy_rms.inc;
        proxy_pass http://rms_backend;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
